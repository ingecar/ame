<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ame - Aplicación Web</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --background-color: #0f172a;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-out;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideDown 0.8s ease-out;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            max-width: 400px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            background-color: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            transform: scale(1.05);
        }

        .btn-secondary {
            background-color: transparent;
            border: 2px solid var(--primary-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: rgba(99, 102, 241, 0.15);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin: 2rem 0;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AME</h1>
        <p>Bienvenido a la nueva aplicación web. Un entorno dinámico, seguro y accesible desde cualquier lugar.</p>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Lunes</th>
                        <th>Martes</th>
                        <th>Miércoles</th>
                        <th>Jueves</th>
                        <th>Viernes</th>
                        <th>Sábado</th>
                        <th>Domingo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>34</td>
                        <td>56</td>
                        <td>12</td>
                        <td>89</td>
                        <td>45</td>
                        <td>67</td>
                        <td>23</td>
                    </tr>
                    <tr>
                        <td>18</td>
                        <td>92</td>
                        <td>44</td>
                        <td>73</td>
                        <td>29</td>
                        <td>51</td>
                        <td>88</td>
                    </tr>
                    <tr>
                        <td>55</td>
                        <td>21</td>
                        <td>76</td>
                        <td>38</td>
                        <td>94</td>
                        <td>15</td>
                        <td>62</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
            <a href="#" class="btn">Empezar ahora</a>
            <a href="https://www.google.com" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">Ir a
                Google</a>
        </div>
    </div>
</body>

</html>
